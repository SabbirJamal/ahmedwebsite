version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd .. && npm ci
    build:
      commands:
        - cd .. && npm run build -w client
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - ../node_modules/**/*
      - node_modules/**/*
  customRules:
    - source: </^[^.]+$|\.(?!(css|gif|ico|jpg|jpeg|js|png|txt|svg|woff|woff2|ttf|map|json|webp|mp4)$)([^.]+$)/>
      target: /index.html
      status: '200'
